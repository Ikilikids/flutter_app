  flutter:
    sdk: flutter
  flutter_localizations: # 追加
    sdk: flutter # 追加
  common:
    path: ../common
  shared_preferences: ^2.0.15
  cupertino_icons: ^1.0.8
  excel: ^4.0.6 # Excelパッケージを追加
  path_provider: ^2.0.11 # path_providerパッケージを追加
