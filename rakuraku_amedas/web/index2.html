<!DOCTYPE html>
<html>
<head>
  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBqVewHk-IXihS6iMAnHIwavmCTIwm3hNI"></script>

  <!-- Base href（Flutter build で置換） -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <meta name="description" content="アメダス図鑑は日本の気象観測データをわかりやすく表示するWebアプリです">
  <meta name="keywords" content="天気, 気象, アメダス, 日本, データ">

  <title>アメダス図鑑</title>

  <!-- AdSense ライブラリ -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"
          crossorigin="anonymous"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Flutter の描画領域 */
    #flutter_container {
      flex: 1; /* 広告分以外の残りを占有 */
      overflow: hidden;
    }

    /* 下部広告 */
    #adcontainer {
      height: 90px; /* 固定高さバナー */
      text-align: center;
      background: #f0f0f0;
    }
  </style>
</head>

<body>
  <!-- Flutter Web -->
  <div id="flutter_container"></div>

  <!-- 下部広告 -->
  <div id="adcontainer">
    <ins class="adsbygoogle"
         style="display:inline-block;width:100%;height:90px"
         data-ad-client="ca-pub-1440692612851416"
         data-ad-slot="8011802369"
         data-adtest="on"></ins>
  </div>

  <!-- Flutter ローダー -->
  <script src="flutter.js" defer></script>
  <script>
    // Flutter を #flutter_container のみ描画
    window.addEventListener('load', function() {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            hostElement: document.querySelector("#flutter_container")
          }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });

      // 広告描画（ins の直後で呼ぶ）
      (adsbygoogle = window.adsbygoogle || []).push({});
    });
  </script>
</body>
</html>
