<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AdSense テスト</title>

  <!-- AdSense ライブラリ -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"
          crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* 画面全体 */
      background: #f8f8f8;
    }
    #ad_container {
      width: 320px;
      height: 90px;
      background: #eee;
      text-align: center;
      line-height: 90px;
    }
  </style>
</head>
<body>

  <!-- テスト広告枠 -->
  <div id="ad_container">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-1440692612851416"
         data-ad-slot="8011802369"
         data-ad-format="auto"
         data-full-width-responsive="true"
         data-adtest="on"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

</body>
</html>
