name: quiz
description: Common utilities and widgets for cal_easy and reflect.
publish_to: none # ← ★これを追加
version: 0.0.1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  soundpool:
    path: ../common/soundpool_local
  common:
    path: ../common
  provider: ^6.0.0
  shared_preferences: ^2.0.0
  google_mobile_ads: ^5.0.0
  cloud_firestore: ^6.0.0
  firebase_auth: ^6.0.0
  flutter_math_fork: ^0.7.2
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  flutter_hooks: ^0.20.0
  flutter_riverpod: ^2.4.5
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.4.5
  freezed_annotation: ^2.4.1 # 必須
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0 # ストアを開く用
  csv: ^5.1.1
  fl_chart: ^1.1.1
  math_expressions: ^3.1.0

dev_dependencies:
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.5
  freezed: ^2.5.2

flutter:
  generate: true
