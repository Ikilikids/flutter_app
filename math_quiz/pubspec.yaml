name: math_quiz
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 4.0.3+18

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # 追加
    sdk: flutter # 追加
  common:
    path: ../common
  shared_preferences: ^2.0.15
  cupertino_icons: ^1.0.8
  path_provider: ^2.0.11 # path_providerパッケージを追加
  flutter_math_fork: ^0.7.2
  csv: ^6.0.0
  logger: ^2.6.1
  fl_chart: ^1.0.0
  math_expressions: ^3.0.0
  petitparser: ^6.0.0
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  just_audio: ^0.10.4
  provider: ^6.1.5
  google_mobile_ads: ^5.0.0
  firebase_crashlytics: ^5.0.0
  flutter_launcher_icons: ^0.10.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
