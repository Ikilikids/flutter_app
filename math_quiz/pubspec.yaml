name: math_quiz
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 5.0.2+23

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # 追加
    sdk: flutter # 追加
  common:
    path: ../common
  quiz:
    path: ../quiz
  shared_preferences: ^2.0.15
  cupertino_icons: ^1.0.8
  path_provider: ^2.0.11 # path_providerパッケージを追加
  flutter_math_fork: ^0.7.2
  csv:
  logger: ^2.6.1
  fl_chart: ^1.0.0
  math_expressions:
  petitparser:
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  just_audio: ^0.10.4
  provider: ^6.1.5
  google_mobile_ads: ^5.0.0
  firebase_crashlytics: ^5.0.0
  flutter_launcher_icons: ^0.10.0
  intl: ^0.20.2
  flutter_hooks: ^0.20.0
  flutter_riverpod: ^2.4.5
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.4.5
  freezed_annotation: ^2.4.1 # 必須
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0 # ストアを開く用

dev_dependencies:
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.5
  freezed: ^2.5.2

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/csv/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
